<div class="contact-container">
  <div class="banner-section">
    <img [src]="'img/banner.png'" alt="Banner Tech" class="banner-img">
    <div class="banner-overlay"></div>
  </div>

  <div class="contact-grid">
    <section class="contact-form-section">
      <h2 class="section-title">Contáctanos</h2>
      <p class="subtitle">Siéntete libre de contactarte con nosotros y te responderemos lo más pronto posible.</p>

      <form class="glass-form">
        <div class="form-group">
          <label>Nombre:</label>
          <input type="text" placeholder="Tu nombre completo">
        </div>

        <div class="form-group">
          <label>Correo Electrónico:</label>
          <input type="email" placeholder="ejemplo@correo.com">
        </div>

        <div class="form-group">
          <label>Mensaje:</label>
          <textarea rows="3" placeholder="Escribe tu mensaje aquí..."></textarea>
        </div>

        <button type="submit" class="btn-send">Enviar</button>
      </form>
    </section>

    <section class="social-section">
      <h2 class="section-title">Nuestras Redes Sociales</h2>
      
      <div class="social-icons-grid">
        <div class="social-item">
          <div class="icon-circle whatsapp">
            <i class="fab fa-whatsapp"></i>
          </div>
        </div>
        <div class="social-item">
          <div class="icon-circle instagram">
            <i class="fab fa-instagram"></i>
          </div>
        </div>
        <div class="social-item">
          <div class="icon-circle facebook">
            <i class="fab fa-facebook-f"></i>
          </div>
        </div>
        <div class="social-item">
          <div class="icon-circle email">
            <i class="fas fa-envelope"></i>
          </div>
        </div>
          <div class="social-item">
          <div class="icon-circle x">
            <i class="fas fa-x"></i>
          </div>
        </div>
           <div class="social-item">
          <div class="icon-circle telegram">
            <i class="fas fa-telegram"></i>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
