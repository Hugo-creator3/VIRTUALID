<div class="login-container">
  <div class="tech-particles">
    <div class="particle chip"></div>
    <div class="particle code"></div>
    <div class="particle wifi"></div>
    <div class="particle node"></div>
    <div class="particle binary"></div>
  </div>

  <div class="login-card">
    <h2>INICIO DE SESIÓN</h2>

    <form (ngSubmit)="submitLogin()">

      <!-- Email -->
      <div class="input-group" [class.has-error]="hasError('email')">
        <label>Correo</label>
        <input
          type="email"
          placeholder="nombre@gmail.com"
          [(ngModel)]="email"
          name="email"
          (blur)="markTouched('email')"
          (input)="markTouched('email')"
        />
        <span class="error-msg" *ngIf="hasError('email')">
          ⚠ {{ errorMsg('email') }}
        </span>
      </div>

      <!-- Contraseña -->
      <div class="input-group" [class.has-error]="hasError('password')">
        <label>Contraseña</label>
        <div class="password-wrap">
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="********"
            [(ngModel)]="password"
            name="password"
            (blur)="markTouched('password')"
            (input)="markTouched('password')"
          />
         
        </div>
        <span class="error-msg" *ngIf="hasError('password')">
          ⚠ {{ errorMsg('password') }}
        </span>
      </div>

      <p class="forgot">¿Olvidaste tu contraseña?</p>

      <!-- Botón submit -->
      <button type="submit" class="btn-primary" [disabled]="isLoading">
        <span *ngIf="!isLoading">Entrar</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <!-- Error general (viene del servidor) -->
      <p class="server-error" *ngIf="serverError">⚠ {{ serverError }}</p>

      <p class="continue">O continúa con:</p>

      <div class="social-buttons">
        <button type="button" class="google">
          <i class="fab fa-google"></i>
        </button>
        <button type="button" class="github">
          <i class="fab fa-github"></i>
        </button>
        <button type="button" class="facebook">
          <i class="fab fa-facebook-f"></i>
        </button>
      </div>
    </form>

    <p class="register">
      ¿No tienes cuenta?
      <span (click)="irRegistro()">Regístrate</span>
    </p>
  </div>
</div>
