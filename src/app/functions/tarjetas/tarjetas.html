<div class="main-container">


  <h1 class="page-title">Diseño de tarjeta</h1>

  <div class="content-grid">
    <section class="card-section left-panel">
      <h2>Cargar logo institucional</h2>
      
      <div class="upload-zone">
        <div class="upload-icon">📁</div>
        <p>Arrastra el logo o haz clic para seleccionar</p>
        <span class="file-info">PNG, JPG (máx... 5MB)</span>
      </div>

      <div class="ia-alert">
        <strong>IA Activa:</strong> Al cargar el logo, se extraerá automáticamente la paleta de colores
      </div>

      <div class="palette-section">
        <h3>Paleta extraída:</h3>
        <div class="colors">
          <div class="color-circle" style="background-color: #6a0d6a;"></div>
          <div class="color-circle" style="background-color: #0000ff;"></div>
          <div class="color-circle" style="background-color: #000000;"></div>
          <div class="color-circle" style="background-color: #8c7e7e;"></div>
        </div>
      </div>
    </section>

    <section class="card-section right-panel">
      <div class="settings-icon">⚙️</div>
      
      <div class="id-card-preview">
        <div class="card-header">
          <span class="institution-name">Institución</span>
        </div>
        
        <div class="card-body">
          <div class="profile-pic">
            <img src="https://via.placeholder.com/80" alt="Profile">
          </div>
          <div class="user-info">
            <h4 class="user-name">Elizabeth Vega</h4>
            <p class="user-id">ID: 204I30423</p>
            <p class="user-role">Estudiante</p>
          </div>
        </div>
        
        <div class="qr-code">
          <div class="qr-icon">🔳</div>
        </div>
      </div>

      <div class="form-group">
        <label>Nombre de Institución:</label>
        <input type="text" class="input-field">
      </div>

      <button class="btn-save">Guardar Plantilla</button>
    </section>
  </div>
</div>
