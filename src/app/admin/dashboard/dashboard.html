<div class="dashboard-container">

  <h1 class="title">Panel de Control Desarrollador</h1>

  <div class="cards-row">
    <div class="card">
      <div class="icon">$</div>
      <h2>10M</h2>
      <p>Suma de ventas</p>
    </div>

    <div class="card">
      <div class="icon">$</div>
      <h2>5K</h2>
      <p>Sum of ganancias</p>
    </div>

    <div class="card">
      <div class="icon">$</div>
      <h2>600K</h2>
      <p>Suma de costos extras</p>
    </div>

    <div class="card">
      <div class="icon">$</div>
      <h2>70K</h2>
      <p>Suma de cantidad</p>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <canvas id="barChart"></canvas>
    </div>

    <div class="chart-card">
      <canvas id="lineChart"></canvas>
    </div>
  </div>

  <div class="buttons-row">
    <button class="main-btn">Listas</button>
    <button class="main-btn">Configuración</button>
    <button class="main-btn">Mensajes</button>
  </div>

</div>
